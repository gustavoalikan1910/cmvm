
networks:
  cvmc-network:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  airflow-logs:

x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile.airflow
  user: "0:0"
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/config:/opt/airflow/config
    - airflow-logs:/opt/airflow/logs
    - /var/run/docker.sock:/var/run/docker.sock
  depends_on:
    - postgres
  networks:
    - cvmc-network

services:

  postgres:
    image: postgres:15
    container_name: cvmc-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - cvmc-network
    restart: always

  minio:
    image: minio/minio
    container_name: cvmc-minio
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    command: server /data --console-address ":9001"
    networks:
      - cvmc-network
    restart: always

  airflow-init:
    <<: *airflow-common
    container_name: cvmc-airflow-init
    command: bash -c "/home/airflow/.local/bin/airflow db migrate && /home/airflow/.local/bin/airflow users create --username ${AIRFLOW_ADMIN_USER} --password ${AIRFLOW_ADMIN_PASSWORD} --firstname Admin --lastname CVMC --role Admin --email admin@cvmc.com || true"
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    container_name: cvmc-airflow-webserver
    command: webserver
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    container_name: cvmc-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

  jupyter:
    build:
      context: ./jupyter
      dockerfile: Dockerfile
    container_name: cvmc-jupyter
    env_file: .env
    environment:
      JUPYTER_TOKEN: ${JUPYTER_TOKEN}
    volumes:
      - ./jupyter/notebooks:/home/jovyan/work
    ports:
      - "127.0.0.1:8888:8888"
    command: start-notebook.sh --ServerApp.token='' --ServerApp.password=''
    networks:
      - cvmc-network
    restart: always

  website:
    build:
      context: ./website
      dockerfile: Dockerfile
    container_name: cvmc-website
    env_file: .env
    environment:
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
    ports:
      - "80:3000"
    volumes:
      - ./website:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - cvmc-network
    depends_on:
      - postgres
    restart: always
